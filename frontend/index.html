<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CircleTok</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>🎬 CircleTok</h1>
            <div class="user-info">
                <span id="username"></span>
                <div class="avatar" id="avatar"></div>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="feed" onclick="switchTab('feed')">📹 Лента</button>
            <button class="tab-btn" data-tab="favorites" onclick="switchTab('favorites')">❤️ Избранное</button>
            <button class="tab-btn" data-tab="profile" onclick="switchTab('profile')">👤 Профиль</button>
            <button class="tab-btn" data-tab="upload" onclick="switchTab('upload')">➕ Создать</button>
            <button class="tab-btn adult-tab" data-tab="adult" onclick="switchTab('adult')">🔞 18+</button>
        </div>
        
        <div id="content" class="content">
            <div class="loading">⏳ Загрузка...</div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
