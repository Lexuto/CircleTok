<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CircleTok</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* Хедер */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info span {
            font-size: 14px;
            opacity: 0.8;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            overflow-x: auto;
            background: rgba(0,0,0,0.9);
            padding: 10px;
            gap: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 10px;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .adult-tab.active {
            background: linear-gradient(135deg, #ff4d4d, #cc0000);
        }

        /* Контент */
        .content {
            padding: 20px;
            padding-bottom: 80px;
            min-height: 70vh;
        }

        /* Лента */
        .feed-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .video-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }

        .video-wrapper {
            position: relative;
            background: #000;
        }

        .video-player {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            cursor: pointer;
        }

        .video-placeholder {
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            font-size: 48px;
        }

        .video-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .video-stats {
            display: flex;
            gap: 15px;
        }

        .like-btn {
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }

        .video-info {
            text-align: right;
        }

        .username {
            display: block;
            font-size: 12px;
            opacity: 0.8;
        }

        /* Профиль */
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .profile-header {
            padding: 30px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 15px;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 24px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }

        /* Загрузка */
        .upload-container {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }

        .upload-options {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0;
        }

        .btn-primary, .btn-secondary {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-primary:hover, .btn-secondary:hover {
            transform: scale(1.02);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .btn-stop {
            background: #ff4d4d;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        .btn-cancel {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        .preview-container {
            margin: 20px 0;
        }

        .preview-container video {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
        }

        .record-controls {
            text-align: center;
            margin-top: 20px;
        }

        .timer {
            font-size: 48px;
            font-weight: bold;
            font-family: monospace;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4d4d, #ff9d4d);
            width: 0%;
            transition: width 0.1s linear;
        }

        .record-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .preview-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #ff4d4d;
        }

        .hidden {
            display: none;
        }

        .upload-tips {
            text-align: left;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            margin-top: 30px;
        }

        .upload-tips ul {
            margin-top: 10px;
            padding-left: 20px;
        }

        /* Уведомления */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 12px 20px;
            min-width: 200px;
            text-align: center;
            z-index: 10000;
            transition: transform 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .notification-title {
            font-weight: bold;
            margin-bottom: 4px;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>🎬 CircleTok</h1>
            <div class="user-info">
                <span id="username">Гость</span>
                <div class="avatar" id="avatar">👤</div>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="feed" onclick="switchTab('feed')">📹 Лента</button>
            <button class="tab-btn" data-tab="favorites" onclick="switchTab('favorites')">❤️ Избранное</button>
            <button class="tab-btn" data-tab="profile" onclick="switchTab('profile')">👤 Профиль</button>
            <button class="tab-btn" data-tab="upload" onclick="switchTab('upload')">➕ Создать</button>
            <button class="tab-btn adult-tab" data-tab="adult" onclick="switchTab('adult')">🔞 18+</button>
        </div>
        
        <div id="content" class="content">
            <div class="loading">⏳ Загрузка...</div>
        </div>
    </div>

    <script>
        // ============ ИНИЦИАЛИЗАЦИЯ ============
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user || { id: Date.now(), username: 'user', first_name: 'Гость' };
        
        // API URL - замени на свой Render URL
        const API_URL = 'https://circletok.onrender.com/api';
        
        // Глобальные переменные
        let currentFeed = [];
        let mediaRecorder = null;
        let recordedChunks = [];
        let recordingStream = null;
        let recordingTimer = null;
        let recordingSeconds = 0;
        let currentUserId = user.id.toString();
        
        // Расширяем приложение
        tg.expand();
        tg.ready();
        
        // Показать имя пользователя
        document.getElementById('username').innerText = user.first_name || 'Гость';
        
        // ============ УВЕДОМЛЕНИЯ ============
        function showMessage(title, message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = `<div class="notification-title">${title}</div><div>${message}</div>`;
            document.body.appendChild(notification);
            setTimeout(() => notification.classList.add('show'), 10);
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, 2500);
        }
        
        // ============ РЕГИСТРАЦИЯ ============
        async function registerUser() {
            try {
                await fetch(`${API_URL}/user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegram_id: currentUserId,
                        username: user.username || `user_${currentUserId}`,
                        first_name: user.first_name || 'Гость'
                    })
                });
                console.log('✅ Пользователь зарегистрирован');
            } catch (error) {
                console.error('Reg error:', error);
            }
        }
        
        // ============ ЛЕНТА ============
        async function loadFeed(includeAdult = false) {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">⏳ Загрузка видео...</div>';
            
            try {
                const response = await fetch(`${API_URL}/feed?adult=${includeAdult}`);
                if (!response.ok) throw new Error('Ошибка сервера');
                currentFeed = await response.json();
                renderFeed();
            } catch (error) {
                console.error('Feed error:', error);
                content.innerHTML = `
                    <div class="error">
                        ❌ Не удалось загрузить ленту<br>
                        <small>${error.message}</small>
                    </div>
                `;
            }
        }
        
        function renderFeed() {
            const content = document.getElementById('content');
            
            if (currentFeed.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📹</div>
                        <h3>Пока нет видео</h3>
                        <p>Будь первым, кто загрузит кружок!</p>
                        <button class="btn-primary" onclick="switchTab('upload')">➕ Создать кружок</button>
                    </div>
                `;
                return;
            }
            
            content.innerHTML = `
                <div class="feed-container">
                    ${currentFeed.map(video => `
                        <div class="video-card" data-video-id="${video.id}">
                            <div class="video-wrapper">
                                ${video.file_id ? `
                                    <video class="video-player" playsinline muted loop>
                                        <source src="tg://video_note?file_id=${video.file_id}" type="video/mp4">
                                    </video>
                                ` : `<div class="video-placeholder">🎬</div>`}
                                <div class="video-overlay">
                                    <div class="video-stats">
                                        <button class="like-btn" onclick="likeVideo(${video.id})">❤️ ${video.likes_count || 0}</button>
                                    </div>
                                    <div class="video-info">
                                        <span class="username">@${video.username || 'user'}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            // Автовоспроизведение
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (video) {
                        if (entry.isIntersecting) {
                            video.play().catch(() => {});
                        } else {
                            video.pause();
                        }
                    }
                });
            }, { threshold: 0.5 });
            
            document.querySelectorAll('.video-card').forEach(card => observer.observe(card));
        }
        
        function likeVideo(videoId) {
            showMessage('❤️', 'Лайк поставлен!');
        }
        
        // ============ ПРОФИЛЬ ============
        async function loadProfile() {
            document.getElementById('content').innerHTML = `
                <div class="profile-container">
                    <div class="profile-header">
                        <div class="profile-avatar">${(user.first_name?.[0] || 'U')}</div>
                        <h2>${user.first_name || 'User'}</h2>
                        <p class="username">@${user.username || `user_${currentUserId}`}</p>
                        <div class="profile-stats">
                            <div class="stat"><span class="stat-value">0</span><span class="stat-label">видео</span></div>
                            <div class="stat"><span class="stat-value">0</span><span class="stat-label">лайков</span></div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // ============ ИЗБРАННОЕ ============
        async function loadFavorites() {
            document.getElementById('content').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📁</div>
                    <h3>Избранное пусто</h3>
                    <p>Сохраняй понравившиеся видео</p>
                </div>
            `;
        }
        
        // ============ ЗАПИСЬ ВИДЕО ============
        function showUploadInterface() {
            document.getElementById('content').innerHTML = `
                <div class="upload-container">
                    <h2>📹 Создать кружок</h2>
                    <div class="upload-options">
                        <button class="btn-primary" onclick="recordVideo()">🎥 Записать кружок</button>
                        <button class="btn-secondary" onclick="uploadFromGallery()">📁 Загрузить из галереи</button>
                    </div>
                    <div id="previewContainer" class="preview-container hidden"></div>
                    <div class="upload-tips">
                        <h4>💡 Советы:</h4>
                        <ul>
                            <li>Максимальная длина: 60 секунд</li>
                            <li>После загрузки видео уйдёт на модерацию</li>
                            <li>Модератор проверит видео в течение 24 часов</li>
                        </ul>
                    </div>
                </div>
            `;
        }
        
        async function recordVideo() {
            if (mediaRecorder) stopRecording();
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 640 }, 
                    audio: true 
                });
                recordingStream = stream;
                
                const video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.muted = true;
                video.style.width = '100%';
                video.style.borderRadius = '15px';
                
                const container = document.getElementById('previewContainer');
                container.innerHTML = '';
                container.appendChild(video);
                container.classList.remove('hidden');
                
                const controls = document.createElement('div');
                controls.className = 'record-controls';
                controls.innerHTML = `
                    <div class="timer">0:00</div>
                    <div class="progress-bar"><div class="progress-fill"></div></div>
                    <div class="record-buttons">
                        <button class="btn-stop" onclick="stopRecording()">⏹️ Остановить</button>
                        <button class="btn-cancel" onclick="cancelRecording()">❌ Отмена</button>
                    </div>
                `;
                container.appendChild(controls);
                
                mediaRecorder = new MediaRecorder(stream);
                recordedChunks = [];
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };
                
                mediaRecorder.onstop = () => {
                    if (recordedChunks.length > 0) {
                        const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                        showPreviewAndConfirm(blob);
                    }
                };
                
                mediaRecorder.start(1000);
                recordingSeconds = 0;
                
                recordingTimer = setInterval(() => {
                    recordingSeconds++;
                    const mins = Math.floor(recordingSeconds / 60);
                    const secs = recordingSeconds % 60;
                    const timer = document.querySelector('.timer');
                    const fill = document.querySelector('.progress-fill');
                    if (timer) timer.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                    if (fill) fill.style.width = `${Math.min((recordingSeconds / 60) * 100, 100)}%`;
                    if (recordingSeconds >= 60) stopRecording();
                }, 1000);
                
            } catch (error) {
                console.error('Camera error:', error);
                showMessage('❌ Ошибка', 'Нет доступа к камере');
            }
        }
        
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            if (recordingTimer) {
                clearInterval(recordingTimer);
                recordingTimer = null;
            }
            if (recordingStream) {
                recordingStream.getTracks().forEach(t => t.stop());
                recordingStream = null;
            }
        }
        
        function cancelRecording() {
            if (mediaRecorder) mediaRecorder.onstop = null;
            stopRecording();
            recordedChunks = [];
            const container = document.getElementById('previewContainer');
            container.classList.add('hidden');
            container.innerHTML = '';
        }
        
        function showPreviewAndConfirm(blob) {
            const url = URL.createObjectURL(blob);
            const container = document.getElementById('previewContainer');
            container.innerHTML = `
                <div class="preview-wrapper">
                    <video src="${url}" controls autoplay loop></video>
                    <div class="preview-buttons">
                        <button class="btn-primary" onclick="confirmUpload('${url}')">✅ Отправить</button>
                        <button class="btn-secondary" onclick="retakeVideo()">🔄 Переснять</button>
                    </div>
                </div>
            `;
        }
        
        async function confirmUpload(videoURL) {
            const response = await fetch(videoURL);
            const blob = await response.blob();
            const file = new File([blob], `circle_${Date.now()}.mp4`, { type: 'video/mp4' });
            await uploadVideo(file);
            URL.revokeObjectURL(videoURL);
            document.getElementById('previewContainer').classList.add('hidden');
        }
        
        function retakeVideo() {
            document.getElementById('previewContainer').classList.add('hidden');
            document.getElementById('previewContainer').innerHTML = '';
            recordVideo();
        }
        
        function uploadFromGallery() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'video/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file.size > 50 * 1024 * 1024) {
                    showMessage('❌ Ошибка', 'Видео больше 50 МБ');
                    return;
                }
                await uploadVideo(file);
            };
            input.click();
        }
        
        async function uploadVideo(file) {
            showMessage('📤', 'Загрузка видео...');
            
            const formData = new FormData();
            formData.append('video', file);
            formData.append('user_telegram_id', currentUserId);
            
            try {
                const response = await fetch(`${API_URL}/upload`, { 
                    method: 'POST', 
                    body: formData 
                });
                const result = await response.json();
                
                if (result.success) {
                    showMessage('✅', 'Видео отправлено на модерацию!');
                    setTimeout(() => switchTab('feed'), 2000);
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                console.error('Upload error:', error);
                showMessage('❌ Ошибка', 'Не удалось загрузить видео');
            }
        }
        
        // ============ ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ============
        function switchTab(tab) {
            // Обновляем активную кнопку
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-tab') === tab) {
                    btn.classList.add('active');
                }
            });
            
            // Загружаем контент
            switch(tab) {
                case 'feed':
                    loadFeed(false);
                    break;
                case 'adult':
                    loadFeed(true);
                    break;
                case 'favorites':
                    loadFavorites();
                    break;
                case 'profile':
                    loadProfile();
                    break;
                case 'upload':
                    showUploadInterface();
                    break;
            }
        }
        
        // ============ ЗАПУСК ============
        registerUser();
        
        // Делаем функции глобальными для onclick
        window.switchTab = switchTab;
        window.recordVideo = recordVideo;
        window.stopRecording = stopRecording;
        window.cancelRecording = cancelRecording;
        window.confirmUpload = confirmUpload;
        window.retakeVideo = retakeVideo;
        window.uploadFromGallery = uploadFromGallery;
        window.likeVideo = likeVideo;
        
        // Загружаем ленту
        setTimeout(() => loadFeed(false), 500);
    </script>
</body>
</html>
