<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CircleTok</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#000;color:#fff}
        .header{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:rgba(0,0,0,0.95);position:sticky;top:0;z-index:100}
        .header h1{font-size:24px;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .user-info{display:flex;align-items:center;gap:10px}
        .avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center}
        .tabs{display:flex;background:rgba(0,0,0,0.9);padding:10px;gap:5px}
        .tab-btn{flex:1;padding:10px;background:transparent;border:none;color:rgba(255,255,255,0.7);font-size:14px;cursor:pointer;border-radius:10px}
        .tab-btn.active{background:linear-gradient(135deg,#667eea,#764ba2);color:white}
        .adult-tab.active{background:linear-gradient(135deg,#ff4d4d,#cc0000)}
        .content{padding:20px;min-height:70vh}
        .feed-container{display:flex;flex-direction:column;gap:20px}
        .video-card{background:rgba(255,255,255,0.05);border-radius:15px;overflow:hidden}
        .video-wrapper{position:relative}
        video{width:100%;aspect-ratio:1;object-fit:cover}
        .video-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.8));padding:20px;display:flex;justify-content:space-between}
        .like-btn{background:rgba(0,0,0,0.5);border:none;color:white;padding:8px 12px;border-radius:20px;cursor:pointer}
        .btn-primary,.btn-secondary{padding:12px 24px;border:none;border-radius:25px;font-size:16px;cursor:pointer}
        .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:white}
        .btn-secondary{background:rgba(255,255,255,0.1);color:white}
        .upload-container{max-width:500px;margin:0 auto;text-align:center}
        .upload-options{display:flex;gap:15px;justify-content:center;margin:30px 0}
        .preview-container{margin:20px 0}
        .preview-container video{width:100%;border-radius:15px}
        .record-controls{text-align:center;margin-top:20px}
        .timer{font-size:48px;font-family:monospace}
        .progress-bar{width:100%;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:15px 0}
        .progress-fill{height:100%;background:linear-gradient(90deg,#ff4d4d,#ff9d4d);width:0%}
        .record-buttons{display:flex;gap:15px;justify-content:center}
        .btn-stop{background:#ff4d4d;color:white;padding:12px 24px;border:none;border-radius:25px;cursor:pointer}
        .btn-cancel{background:rgba(255,255,255,0.2);color:white;padding:12px 24px;border:none;border-radius:25px;cursor:pointer}
        .preview-buttons{display:flex;gap:15px;justify-content:center;margin-top:15px}
        .empty-state{text-align:center;padding:60px 20px}
        .empty-icon{font-size:64px}
        .loading{text-align:center;padding:40px}
        .hidden{display:none}
        .profile-container{max-width:600px;margin:0 auto;text-align:center}
        .profile-header{padding:30px;background:rgba(255,255,255,0.05);border-radius:20px}
        .profile-avatar{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:48px;margin:0 auto 15px}
        .profile-stats{display:flex;justify-content:space-around;margin:20px 0}
        .stat{text-align:center}
        .stat-value{font-size:24px;font-weight:bold}
        .stat-label{font-size:12px;opacity:0.7}
        .upload-tips{text-align:left;background:rgba(255,255,255,0.05);padding:20px;border-radius:15px;margin-top:30px}
        .notification{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:rgba(0,0,0,0.95);border-radius:12px;padding:12px 20px;z-index:10000;transition:transform 0.3s}
        .notification.show{transform:translateX(-50%) translateY(0)}
        .notification-title{font-weight:bold;color:#667eea}
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>🎬 CircleTok</h1>
            <div class="user-info">
                <span id="username">Гость</span>
                <div class="avatar" id="avatar">👤</div>
            </div>
        </div>
        <div class="tabs">
            <button class="tab-btn active" data-tab="feed" onclick="switchTab('feed')">📹 Лента</button>
            <button class="tab-btn" data-tab="favorites" onclick="switchTab('favorites')">❤️ Избранное</button>
            <button class="tab-btn" data-tab="profile" onclick="switchTab('profile')">👤 Профиль</button>
            <button class="tab-btn" data-tab="upload" onclick="switchTab('upload')">➕ Создать</button>
            <button class="tab-btn adult-tab" data-tab="adult" onclick="switchTab('adult')">🔞 18+</button>
        </div>
        <div id="content" class="content"><div class="loading">⏳ Загрузка...</div></div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user || { id: Date.now(), username: 'user', first_name: 'Гость' };
        const API_URL = 'https://circletok.onrender.com/api';
        let currentFeed = [];
        let mediaRecorder = null, recordedChunks = [], recordingStream = null, recordingTimer = null, recordingSeconds = 0;
        let currentUserId = user.id.toString();
        
        tg.expand();
        tg.ready();
        document.getElementById('username').innerText = user.first_name || 'Гость';
        
        function showMessage(title, message) {
            const n = document.createElement('div');
            n.className = 'notification';
            n.innerHTML = `<div class="notification-title">${title}</div><div>${message}</div>`;
            document.body.appendChild(n);
            setTimeout(() => n.classList.add('show'), 10);
            setTimeout(() => { n.classList.remove('show'); setTimeout(() => n.remove(), 300); }, 2500);
        }
        
        async function registerUser() {
            try {
                await fetch(`${API_URL}/user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: currentUserId, username: user.username, first_name: user.first_name })
                });
            } catch(e) { console.error(e); }
        }
        
        async function loadFeed(adult = false) {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">⏳ Загрузка...</div>';
            try {
                const res = await fetch(`${API_URL}/feed?adult=${adult}`);
                currentFeed = await res.json();
                if(currentFeed.length === 0) {
                    content.innerHTML = `<div class="empty-state"><div class="empty-icon">📹</div><h3>Нет видео</h3><button class="btn-primary" onclick="switchTab('upload')">➕ Создать</button></div>`;
                    return;
                }
                content.innerHTML = `<div class="feed-container">${currentFeed.map(v => `
                    <div class="video-card">
                        <div class="video-wrapper">
                            <video class="video-player" playsinline muted loop><source src="tg://video_note?file_id=${v.file_id}" type="video/mp4"></video>
                            <div class="video-overlay">
                                <button class="like-btn" onclick="likeVideo(${v.id})">❤️ ${v.likes_count||0}</button>
                                <span class="username">@${v.username}</span>
                            </div>
                        </div>
                    </div>`).join('')}</div>`;
                new IntersectionObserver((e) => { e.forEach(entry => { const v = entry.target.querySelector('video'); if(v) entry.isIntersecting ? v.play().catch(()=>{}) : v.pause(); }); }, { threshold: 0.5 })
                    .forEach(o => document.querySelectorAll('.video-card').forEach(c => o.observe(c)));
            } catch(e) { content.innerHTML = '<div class="empty-state">❌ Ошибка</div>'; }
        }
        
        function likeVideo(id) { showMessage('❤️', 'Лайк!'); }
        async function loadProfile() {
            document.getElementById('content').innerHTML = `<div class="profile-container"><div class="profile-header"><div class="profile-avatar">${(user.first_name?.[0]||'U')}</div><h2>${user.first_name}</h2><p>@${user.username}</p><div class="profile-stats"><div class="stat"><span class="stat-value">0</span><span class="stat-label">видео</span></div><div class="stat"><span class="stat-value">0</span><span class="stat-label">лайков</span></div></div></div></div>`;
        }
        async function loadFavorites() {
            document.getElementById('content').innerHTML = `<div class="empty-state"><div class="empty-icon">📁</div><h3>Избранное пусто</h3></div>`;
        }
        function showUploadInterface() {
            document.getElementById('content').innerHTML = `<div class="upload-container"><h2>📹 Создать кружок</h2><div class="upload-options"><button class="btn-primary" onclick="recordVideo()">🎥 Записать</button><button class="btn-secondary" onclick="uploadFromGallery()">📁 Загрузить</button></div><div id="previewContainer" class="preview-container hidden"></div><div class="upload-tips"><h4>💡 Советы:</h4><ul><li>Максимум 60 секунд</li><li>После загрузки видео уйдёт на модерацию</li></ul></div></div>`;
        }
        
        async function recordVideo() {
            if(mediaRecorder) stopRecording();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 640 }, audio: true });
                recordingStream = stream;
                const video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.muted = true;
                video.style.width = '100%';
                const container = document.getElementById('previewContainer');
                container.innerHTML = '';
                container.appendChild(video);
                container.classList.remove('hidden');
                const controls = document.createElement('div');
                controls.className = 'record-controls';
                controls.innerHTML = `<div class="timer">0:00</div><div class="progress-bar"><div class="progress-fill"></div></div><div class="record-buttons"><button class="btn-stop" onclick="stopRecording()">⏹️ Стоп</button><button class="btn-cancel" onclick="cancelRecording()">❌ Отмена</button></div>`;
                container.appendChild(controls);
                mediaRecorder = new MediaRecorder(stream);
                recordedChunks = [];
                mediaRecorder.ondataavailable = e => e.data.size && recordedChunks.push(e.data);
                mediaRecorder.onstop = () => { if(recordedChunks.length) showPreviewAndConfirm(new Blob(recordedChunks, { type: 'video/mp4' })); };
                mediaRecorder.start(1000);
                recordingSeconds = 0;
                recordingTimer = setInterval(() => {
                    recordingSeconds++;
                    const mins = Math.floor(recordingSeconds/60), secs = recordingSeconds%60;
                    const t = document.querySelector('.timer'), f = document.querySelector('.progress-fill');
                    if(t) t.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
                    if(f) f.style.width = `${Math.min(recordingSeconds/60*100,100)}%`;
                    if(recordingSeconds>=60) stopRecording();
                },1000);
            } catch(e) { showMessage('❌', 'Нет доступа к камере'); }
        }
        
        function stopRecording() {
            if(mediaRecorder?.state === 'recording') mediaRecorder.stop();
            if(recordingTimer) clearInterval(recordingTimer);
            if(recordingStream) recordingStream.getTracks().forEach(t=>t.stop());
            recordingTimer = null; recordingStream = null;
        }
        function cancelRecording() {
            if(mediaRecorder) mediaRecorder.onstop = null;
            stopRecording();
            recordedChunks = [];
            const c = document.getElementById('previewContainer');
            c.classList.add('hidden');
            c.innerHTML = '';
        }
        function showPreviewAndConfirm(blob) {
            const url = URL.createObjectURL(blob);
            const c = document.getElementById('previewContainer');
            c.innerHTML = `<div class="preview-wrapper"><video src="${url}" controls autoplay loop></video><div class="preview-buttons"><button class="btn-primary" onclick="confirmUpload('${url}')">✅ Отправить</button><button class="btn-secondary" onclick="retakeVideo()">🔄 Переснять</button></div></div>`;
        }
        async function confirmUpload(videoURL) {
            const r = await fetch(videoURL);
            const blob = await r.blob();
            const file = new File([blob], `circle_${Date.now()}.mp4`, { type: 'video/mp4' });
            await uploadVideo(file);
            URL.revokeObjectURL(videoURL);
            document.getElementById('previewContainer').classList.add('hidden');
        }
        function retakeVideo() {
            const c = document.getElementById('previewContainer');
            c.classList.add('hidden');
            c.innerHTML = '';
            recordVideo();
        }
        function uploadFromGallery() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'video/*';
            input.onchange = async e => {
                const f = e.target.files[0];
                if(f.size>50*1024*1024) showMessage('❌','Видео >50МБ');
                else await uploadVideo(f);
            };
            input.click();
        }
        async function uploadVideo(file) {
            showMessage('📤','Загрузка...');
            const fd = new FormData();
            fd.append('video', file);
            fd.append('user_telegram_id', currentUserId);
            try {
                const res = await fetch(`${API_URL}/upload`, { method: 'POST', body: fd });
                const data = await res.json();
                if(data.success) { showMessage('✅','На модерации!'); setTimeout(()=>switchTab('feed'),2000); }
                else throw new Error(data.error);
            } catch(e) { showMessage('❌','Ошибка'); }
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active');
            if(tab==='feed') loadFeed(false);
            else if(tab==='adult') loadFeed(true);
            else if(tab==='favorites') loadFavorites();
            else if(tab==='profile') loadProfile();
            else if(tab==='upload') showUploadInterface();
        }
        
        window.switchTab = switchTab;
        window.recordVideo = recordVideo;
        window.stopRecording = stopRecording;
        window.cancelRecording = cancelRecording;
        window.confirmUpload = confirmUpload;
        window.retakeVideo = retakeVideo;
        window.uploadFromGallery = uploadFromGallery;
        window.likeVideo = likeVideo;
        
        registerUser();
        setTimeout(()=>loadFeed(false),500);
    </script>
</body>
</html>
