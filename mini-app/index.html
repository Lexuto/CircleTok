<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CircleTok</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>CircleTok</h1>
        </header>

        <!-- Feed View -->
        <div id="feed-view" class="view active">
            <div id="video-container">
                <!-- Videos will be rendered here -->
            </div>
            <div id="nav-bar">
                <button class="nav-btn active" data-view="feed">
                    <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                    <span>Лента</span>
                </button>
                <button class="nav-btn" data-view="profile">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <span>Профиль</span>
                </button>
                <button class="nav-btn" data-view="bookmarks">
                    <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
                    <span>Закладки</span>
                </button>
            </div>
        </div>

        <!-- Profile View -->
        <div id="profile-view" class="view">
            <button class="back-btn" data-view="feed">← Назад</button>
            <div id="profile-content">
                <div id="profile-header">
                    <div id="profile-avatar">
                        <img src="" alt="Avatar" id="avatar-img" style="display:none">
                        <div id="avatar-placeholder">👤</div>
                    </div>
                    <h2 id="profile-name">Загрузка...</h2>
                    <p id="profile-bio"></p>
                </div>
                <div id="profile-stats">
                    <div class="stat"><span id="stat-videos">0</span><br><small>Видео</small></div>
                    <div class="stat"><span id="stat-likes">0</span><br><small>Лайки</small></div>
                    <div class="stat"><span id="stat-bookmarks">0</span><br><small>Закладки</small></div>
                </div>
            </div>
        </div>

        <!-- Bookmarks View -->
        <div id="bookmarks-view" class="view">
            <button class="back-btn" data-view="feed">← Назад</button>
            <h2>📌 Закладки</h2>
            <p id="bookmarks-empty" class="empty-msg">Закладок пока нет</p>
            <div id="bookmarks-list"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
